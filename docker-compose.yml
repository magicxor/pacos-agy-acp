services:
  pacos:
    image: ${DOCKER_REGISTRY-}pacos
    build:
      context: .
      dockerfile: Pacos/Dockerfile
    depends_on:
      - gallerydl-webapi

  # gallery-dl backend for the GalleryDl MCP server (spawned by agy inside the
  # pacos container). Same wiring as production: http://gallerydl-webapi:8080.
  gallerydl-webapi:
    image: ghcr.io/magicxor/gallerydl-webapi:latest
